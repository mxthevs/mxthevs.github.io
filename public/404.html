<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Matheus Henrique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #09090b;
      --foreground: #f4f4f5;
      --muted: #a1a1aa;
      --border: rgba(255, 255, 255, 0.08);
      --accent: rgba(255, 255, 255, 0.15);
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--background);
      color: var(--foreground);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Background Glow */
    .ambient-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 70%);
      pointer-events: none;
      z-index: 1;
    }

    .ambient-dot {
      position: absolute;
      width: 2px;
      height: 2px;
      background-color: rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      box-shadow: 0 0 20px 2px rgba(255, 255, 255, 0.2);
    }

    /* Content Card */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      padding: 3rem 2rem;
      margin: 1.5rem;
      background: rgba(10, 10, 10, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .error-code {
      font-family: var(--font-mono);
      font-size: 5rem;
      font-weight: 500;
      letter-spacing: -0.05em;
      line-height: 1;
      color: #ffffff;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
    }

    .divider {
      width: 40px;
      height: 1px;
      background-color: rgba(255, 255, 255, 0.2);
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #ffffff;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      background-color: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #ffffff;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .btn:hover {
      background-color: #ffffff;
      color: #000000;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px);
    }

    /* Footer Meta */
    .meta-tag {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2.5rem;
    }
  </style>
</head>
<body>
  <!-- Ambient glow backdrop -->
  <div class="ambient-glow"></div>
  <div class="ambient-dot" style="top: 25%; left: 30%;"></div>
  <div class="ambient-dot" style="bottom: 30%; right: 25%;"></div>

  <div class="card">
    <div class="error-code">404</div>
    <div class="divider"></div>
    
    <h1 id="error-title">Page Not Found</h1>
    <p id="error-desc">The path you requested could not be resolved or does not exist.</p>
    
    <a href="/" class="btn" id="btn-text">
      // Return to Portfolio
    </a>

    <div class="meta-tag" id="meta-text">
      System.IO.Route_NotFound
    </div>
  </div>

  <script>
    // Self-contained dynamic language toggle for GitHub Pages
    const ptTranslations = {
      title: "Página Não Encontrada",
      desc: "O caminho solicitado não pôde ser resolvido ou não existe em nosso servidor.",
      btn: "// Voltar ao Portfólio",
      meta: "Sistema.Rota_Não_Encontrada"
    };

    const userLang = navigator.language || navigator.userLanguage || "en";
    const isPortuguese = userLang.toLowerCase().startsWith("pt");

    if (isPortuguese) {
      document.documentElement.lang = "pt";
      document.title = "404 | Matheus Henrique";
      document.getElementById("error-title").textContent = ptTranslations.title;
      document.getElementById("error-desc").textContent = ptTranslations.desc;
      document.getElementById("btn-text").textContent = ptTranslations.btn;
      document.getElementById("meta-text").textContent = ptTranslations.meta;
    }
  </script>
</body>
</html>
